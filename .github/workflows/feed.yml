name: Rebuild urgency feed

# The source data drops ~monthly. This runs weekly and rebuilds the feed JSON,
# but build_feed.py keys off the data's own freshness (max action date), so on
# weeks where HF hasn't advanced it changes nothing — no commit, no redeploy.
# When a new monthly batch lands, it commits the updated JSON and Vercel deploys.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * 2"   # Tuesdays, odd minute (GitHub drops top-of-hour crons)

permissions:
  contents: write

concurrency:
  group: urgency-feed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install duckdb pandas tango-python
      - run: python scripts/build_feed.py
        env:
          # Optional: enables the GAO bid-protest enrichment. If unset, the feed
          # still builds (just without the protest data). Add it as a repo secret.
          TANGO_API_KEY: ${{ secrets.TANGO_API_KEY }}

      - name: Commit if the feed changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/urgent.json scripts/feed_state.json
          if git diff --cached --quiet; then
            echo "No change (HF + protests unchanged) — nothing to commit."
          else
            git commit -m "Update urgency feed (data/protests changed) [skip ci]"
            git pull --rebase --autostash origin main && git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Vercel
        if: steps.commit.outputs.changed == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            npx --yes vercel deploy --prod --yes --token "$VERCEL_TOKEN"
          else
            echo "VERCEL_TOKEN not set — feed committed, but skipping deploy."
            echo "Add a VERCEL_TOKEN repo secret (vercel.com/account/tokens) to auto-deploy,"
            echo "or connect the repo to Vercel's Git integration."
          fi
