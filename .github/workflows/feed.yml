name: Rebuild urgency feed

# Runs weekly. Rebuilds the feed JSON (re-fetching GAO protests each run), then
# VALIDATES the data and SMOKE-TESTS the front end before anything ships — so bad
# data or a broken page never reaches the live site. Commits + deploys only when
# the data actually changed. If any step fails, or the data has stopped advancing,
# it opens a GitHub issue so we find out.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 10 * * 2"   # Tuesdays, odd minute (GitHub drops top-of-hour crons)

permissions:
  contents: write
  issues: write

concurrency:
  group: urgency-feed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install duckdb pandas tango-python

      - name: Rebuild the feed
        run: python scripts/build_feed.py
        env:
          # Optional: enables the GAO bid-protest enrichment. If unset, the feed
          # still builds (just without the protest data). Add it as a repo secret.
          TANGO_API_KEY: ${{ secrets.TANGO_API_KEY }}

      - name: Validate feed data (bad data must not ship)
        run: python scripts/validate_feed.py

      - name: Front-end smoke test (page must render against the data)
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
          python scripts/test_site.py

      - name: Commit if the feed changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/urgent.json scripts/feed_state.json
          if git diff --cached --quiet; then
            echo "No change (HF + protests unchanged) — nothing to commit."
          else
            git commit -m "Update urgency feed (data/protests changed) [skip ci]"
            git pull --rebase --autostash origin main && git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Vercel
        if: steps.commit.outputs.changed == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            npx --yes vercel deploy --prod --yes --token "$VERCEL_TOKEN"
          else
            echo "VERCEL_TOKEN not set — feed committed, but skipping deploy."
          fi

      - name: Alert if the data has stopped updating
        run: |
          python - <<'PY'
          import datetime, json, sys
          d = json.load(open("site/urgent.json"))
          age = (datetime.date.today() - datetime.date.fromisoformat(d["data_through"])).days
          print(f"data_through {d['data_through']} — {age} days old")
          # Source drops ~monthly with a few weeks' archive lag, so it can legitimately
          # be ~2 months old. Past 90 days means a drop was almost certainly missed.
          if age > 90:
              sys.exit(f"STALE: feed hasn't advanced in {age} days (>90) — HF may have stopped updating.")
          PY

      - name: Open an issue if this run failed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Urgency feed pipeline is failing"
          RUN="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          N=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')
          if [ -n "$N" ]; then
            gh issue comment "$N" --body "Still failing — the live site was NOT updated. $RUN"
          else
            gh issue create --title "$TITLE" \
              --body "A scheduled run of the urgency feed failed (build, data validation, front-end smoke test, deploy, or staleness check). The live site was NOT updated. Run: $RUN"
          fi
